[tool.ruff]
line-length = 99
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "C4", "SIM", "ARG", "BLE", "RUF"]
ignore = [
    "E501",   # line-too-long (handled by formatter)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["ARG", "I001"]  # pytest fixtures intentionally have unused args; import order managed manually

[tool.ruff.lint.isort]
known-first-party = ["custom_components", "homeassistant"]
known-third-party = ["aiohttp", "voluptuous", "pytest", "pycognito"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_return_any = true
warn_unused_configs = true
strict = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
